name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?Set the SSH_HOST secret}"
          : "${SSH_USERNAME:?Set the SSH_USERNAME secret}"
          : "${SSH_PASSWORD:?Set the SSH_PASSWORD secret}"
          : "${APP_DIR:?Set the APP_DIR secret}"

          export SSHPASS="$SSH_PASSWORD"
          REMOTE_APP_DIR=$(printf '%q' "$APP_DIR")

          sshpass -e ssh -o StrictHostKeyChecking=accept-new "$SSH_USERNAME@$SSH_HOST" \
            "APP_DIR=$REMOTE_APP_DIR bash -s" <<'EOF'
          set -euo pipefail

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main
          pm2 restart all
          EOF
